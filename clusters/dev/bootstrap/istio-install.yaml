    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: "https://github.com/Team-Ikujo/Goti-k8s.git"
      targetRevision: main
      path: "infrastructure/istio/istiod"
      helm:
        valueFiles:
