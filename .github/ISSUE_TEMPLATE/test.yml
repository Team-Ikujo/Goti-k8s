name: "TEST - 테스트"
description: "테스트 추가 또는 수정"
title: "[TEST] "
labels: ["TEST"]
body:
  - type: textarea
    id: summary
    attributes:
      label: "개요"
      description: "어떤 테스트를 추가/수정하려고 하나요?"
      placeholder: "테스트 대상과 목적을 설명해 주세요"
    validations:
      required: true
  - type: textarea
    id: tasks
    attributes:
      label: "작업 내용"
      description: "구체적인 작업 항목을 작성해 주세요"
      placeholder: |
        - [ ] 작업 1
        - [ ] 작업 2
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: "참고 사항"
      description: "추가 참고 사항이 있다면 작성해 주세요"
      placeholder: "관련 문서, 링크 등"
    validations:
      required: false
