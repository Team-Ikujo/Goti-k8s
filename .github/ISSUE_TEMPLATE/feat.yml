name: "FEAT - 기능 추가"
description: "새로운 기능 추가 요청"
title: "[FEAT] "
labels: ["FEAT"]
body:
  - type: textarea
    id: summary
    attributes:
      label: "개요"
      description: "추가할 기능에 대한 간략한 설명"
      placeholder: "어떤 기능을 추가하려고 하나요?"
    validations:
      required: true
  - type: textarea
    id: tasks
    attributes:
      label: "작업 내용"
      description: "구체적인 작업 항목을 작성해 주세요"
      placeholder: |
        - [ ] 작업 1
        - [ ] 작업 2
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: "참고 사항"
      description: "추가 참고 사항이 있다면 작성해 주세요"
      placeholder: "관련 문서, 링크, 스크린샷 등"
    validations:
      required: false
