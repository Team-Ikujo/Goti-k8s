name: "REFACTOR - 리팩토링"
description: "기능 변경 없는 코드/구조 개선"
title: "[REFACTOR] "
labels: ["REFACTOR"]
body:
  - type: textarea
    id: summary
    attributes:
      label: "개요"
      description: "리팩토링 대상과 목적을 설명해 주세요"
      placeholder: "어떤 부분을 왜 개선하려고 하나요?"
    validations:
      required: true
  - type: textarea
    id: tasks
    attributes:
      label: "작업 내용"
      description: "구체적인 작업 항목을 작성해 주세요"
      placeholder: |
        - [ ] 작업 1
        - [ ] 작업 2
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: "참고 사항"
      description: "추가 참고 사항이 있다면 작성해 주세요"
      placeholder: "관련 문서, 링크 등"
    validations:
      required: false
