    - name: goti-sli-recording-long
      interval: 5m
      rules:
        - record: goti:sli:availability:1h
          expr: |
            1 - (
              (sum(rate(http_server_request_duration_seconds_count{job="goti/goti-server", http_response_status_code=~"5.."}[1h])) or on() vector(0))
              /
              (sum(rate(http_server_request_duration_seconds_count{job="goti/goti-server"}[1h])) > 0)
            )
  
        - record: goti:sli:availability:6h
          expr: |
            1 - (
              (sum(rate(http_server_request_duration_seconds_count{job="goti/goti-server", http_response_status_code=~"5.."}[6h])) or on() vector(0))
              /
              (sum(rate(http_server_request_duration_seconds_count{job="goti/goti-server"}[6h])) > 0)
            )
  
        - record: goti:sli:availability:24h
          expr: |
            1 - (
              (sum(rate(http_server_request_duration_seconds_count{job="goti/goti-server", http_response_status_code=~"5.."}[24h])) or on() vector(0))
              /
              (sum(rate(http_server_request_duration_seconds_count{job="goti/goti-server"}[24h])) > 0)
            )
  
        - record: goti:sli:availability:3d
          expr: |
            1 - (
              (sum(rate(http_server_request_duration_seconds_count{job="goti/goti-server", http_response_status_code=~"5.."}[3d])) or on() vector(0))
              /
              (sum(rate(http_server_request_duration_seconds_count{job="goti/goti-server"}[3d])) > 0)
            )
  
        # -----------------------------------------------------------------------
        # 에러 버짓 순간 소진율 (24h 윈도우 기준)
        # SLO 99.9% 대비 24시간 에러율의 소진 비율
        # remaining = 1 - (실제 에러율 / 허용 에러율)
        # -----------------------------------------------------------------------
        - record: goti:error_budget:remaining
          expr: |
            1 - (
              (1 - goti:sli:availability:24h)
