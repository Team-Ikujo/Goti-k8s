apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: goti-slo-rules
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: goti-monitoring
spec:
  groups:
    - name: goti-slo-burn-rate
      rules:
        # -----------------------------------------------------------------------
        # Multi Burn Rate SLO 알림 (Google SRE Workbook 기반)
        # SLO: 99.9% 가용성 (30일 윈도우)
        # 허용 에러 버짓: 0.1% = 43.2분/30일
        # -----------------------------------------------------------------------
  
        # Fast burn: 1시간 내 14.4배 + 6시간 내 6배 버짓 소진 속도
        # → 약 2시간 내 전체 버짓 소진 예상, 즉각 대응 필요
        # recording rule이 NaN(트래픽 없음)이면 발동하지 않음
        - alert: SLOBurnRateFast
          expr: |
            (1 - goti:sli:availability:1h) > (14.4 * 0.001)
            and
            (1 - goti:sli:availability:6h) > (6 * 0.001)
            and goti:sli:availability:1h <= 1
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "SLO burn rate 급증 — 에러 버짓 빠르게 소진 중"
            description: |
              1시간 에러율이 SLO 버짓의 14.4배를 초과합니다.
              현재 1h 에러율: {{ $value | humanizePercentage }}
              즉각적인 원인 파악 및 대응이 필요합니다.
  
        # Slow burn: 24시간 내 3배 + 72시간 내 1배 버짓 소진 속도
        # → 약 10일 내 전체 버짓 소진 예상, 계획적 대응 필요
        - alert: SLOBurnRateSlow
          expr: |
            (1 - goti:sli:availability:24h) > (3 * 0.001)
            and
            (1 - goti:sli:availability:3d) > (1 * 0.001)
            and goti:sli:availability:24h <= 1
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "SLO burn rate 지속 상승 — 에러 버짓 점진적 소진 중"
            description: |
              24시간 에러율이 SLO 버짓의 3배를 초과하고 있습니다.
              현재 24h 에러율: {{ $value | humanizePercentage }}
              근본 원인 분석 및 계획적 개선이 필요합니다.
  
        # 에러 버짓 잔여 30% 미만
        # recording rule이 존재할 때만 평가
        - alert: ErrorBudgetNearExhaustion
          expr: |
            goti:error_budget:remaining < 0.30
            and goti:error_budget:remaining <= 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "에러 버짓 잔여 30% 미만"
            description: |
              현재 에러 버짓 잔여율: {{ $value | humanizePercentage }}
              추가 장애 발생 시 SLO 위반 가능성이 높습니다.
              신규 배포를 자제하고 안정성 개선에 집중하세요.
  
        # 에러 버짓 소진 (0% 이하)
        - alert: ErrorBudgetExhausted
          expr: |
            goti:error_budget:remaining < 0
            and goti:error_budget:remaining <= 1
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "에러 버짓 소진 — SLO 위반 상태"
            description: |
              에러 버짓이 완전히 소진되었습니다.
              현재 잔여율: {{ $value | humanizePercentage }}
              신규 기능 배포를 중단하고 안정성 복구에 집중하세요.
