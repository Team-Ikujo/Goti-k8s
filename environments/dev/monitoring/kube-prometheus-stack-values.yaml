# kube-prometheus-stack dev-kind values
prometheus:
  serviceAccount:
    automountServiceAccountToken: true  # Prometheus는 scraping RBAC에 SA token 필요
  prometheusSpec:
    replicas: 1
    retention: 24h
    retentionSize: "3GiB"  # retention/retentionSize 중 먼저 도달하는 조건 트리거. PVC 5Gi: WAL ~1GiB + blocks 3GiB + compaction headroom ~1GiB
    enableRemoteWriteReceiver: true
    enableFeatures:
      - exemplar-storage
    externalUrl: "/prometheus"
    routePrefix: "/prometheus"
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi
    ruleSelectorNilUsesHelmValues: false
    # Istio metrics scraping
    additionalScrapeConfigs:
      - job_name: 'istio-mesh'
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names: ['istio-system']
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
            action: keep
            regex: istiod;http-monitoring

  # container securityContext — upstream chart 기본값에 위임
  # kps는 prometheus/alertmanager/grafana 각각 chart 레벨에서 관리
  # runAsNonRoot/fsGroup은 pod securityContext로 chart가 자동 설정

alertmanager:
  enabled: true
  serviceAccount:
    automountServiceAccountToken: false
  alertmanagerSpec:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi
  config:
    global:
      resolve_timeout: 5m
    route:
      receiver: "null"
      group_by: ["alertname", "severity"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      routes:
        - receiver: "null"
          matchers:
            - severity = critical
        - receiver: "null"
          matchers:
            - severity = warning
    inhibit_rules:
      - source_matchers:
          - severity = critical
        target_matchers:
          - severity = warning
        equal: ["alertname"]
    receivers:
      - name: "null"
      # TODO: Slack webhook 또는 email receiver 추가 예정
      # - name: slack
      #   slack_configs:
      #     - api_url: <webhook-url>
      #       channel: '#goti-alerts'

grafana:
  enabled: true
  serviceAccount:
    automountServiceAccountToken: false
  admin:
    existingSecret: grafana-admin-secret
    userKey: admin-user
    passwordKey: admin-password
  grafana.ini:
    server:
      root_url: "https://kind.go-ti.shop/grafana/"
      serve_from_sub_path: true
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      folderAnnotation: grafana_folder
      provider:
        foldersFromFilesStructure: false
    datasources:
      defaultDatasourceEnabled: true
      uid: prometheus
      exemplarTraceIdDestinations:
        datasourceUid: tempo
        traceIdLabelName: trace_id
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 384Mi
  additionalDataSources:
    - name: Loki
      type: loki
      uid: loki
      url: http://loki-dev.monitoring.svc:3100
      access: proxy
      isDefault: false
      jsonData:
        maxLines: 1000
        derivedFields:
          - datasourceUid: tempo
            matcherRegex: "traceId=(\\w+)"
            name: TraceID (logfmt)
            url: "$${__value.raw}"
            urlDisplayLabel: "View Trace"
          - datasourceUid: tempo
            matcherRegex: "\"traceId\":\"(\\w+)\""
            name: TraceID (JSON)
            url: "$${__value.raw}"
            urlDisplayLabel: "View Trace"
          - datasourceUid: tempo
            matcherRegex: "([a-f0-9]{16,32})"
            matcherType: "label"
            name: TraceID (label)
            url: "$${__value.raw}"
            urlDisplayLabel: "View Trace"
    - name: Tempo
      type: tempo
      uid: tempo
      url: http://tempo-dev.monitoring.svc:3200
      access: proxy
      isDefault: false
      jsonData:
        tracesToLogsV2:
          datasourceUid: loki
          filterByTraceID: true
          filterBySpanID: true
          tags:
            - key: "service.name"
              value: "service_name"
          customQuery: true
          query: '{service_name="${__span.tags["service.name"]}"} | traceId="${__trace.traceId}"'
        tracesToMetrics:
          datasourceUid: prometheus
          tags:
            - key: "service.name"
              value: "job"
          queries:
            - name: "Request Rate"
              query: "sum(rate(http_server_request_duration_seconds_count{job=\"${__tags}\"}[5m]))"
            - name: "Error Rate"
              query: "sum(rate(http_server_request_duration_seconds_count{job=\"${__tags}\", http_response_status_code=~\"5..\"}[5m])) / sum(rate(http_server_request_duration_seconds_count{job=\"${__tags}\"}[5m]))"
        serviceMap:
          datasourceUid: prometheus
        lokiSearch:
          datasourceUid: loki
        nodeGraph:
          enabled: true
    - name: Alertmanager
      type: alertmanager
      uid: alertmanager
      url: http://kube-prometheus-stack-dev-alertmanager.monitoring.svc:9093
      access: proxy
      isDefault: false
      jsonData:
        implementation: prometheus
        handleGrafanaManagedAlerts: false

nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true
