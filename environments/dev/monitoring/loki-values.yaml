# Loki dev-kind values — SingleBinary mode
deploymentMode: SingleBinary
serviceAccount:
  automountServiceAccountToken: true
# container securityContext — Loki SingleBinary chart 기본 securityContext 사용
# readOnlyRootFilesystem: Loki는 /var/loki에 WAL/compactor 쓰기 필요 → false 유지 (chart 기본)
loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h
  structuredConfig:
    limits_config:
      retention_period: 168h
      per_stream_rate_limit: 3MB
      per_stream_rate_limit_burst: 10MB
      allow_structured_metadata: true
      retention_stream:
        - selector: '{log_type="payment"}'
          priority: 1
          period: 720h # 30d (dev) — prod: 43800h (5년, 전자금융거래법 22조)
        - selector: '{log_type="audit"}'
          priority: 2
          period: 336h # 14d (dev) — prod: 17520h (2년, 개인정보보호법)
    compactor:
      working_directory: /var/loki/compactor
      compaction_interval: 10m
      retention_enabled: true
      delete_request_store: filesystem
    ruler:
      storage:
        type: local
        local:
          directory: /var/loki/rules
      rule_path: /var/loki/rules-temp
      alertmanager_url: http://kube-prometheus-stack-dev-alertmanager.monitoring.svc:9093
      ring:
        kvstore:
          store: inmemory
      enable_api: true
singleBinary:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 300m
      memory: 512Mi
  persistence:
    enabled: true
    size: 10Gi
  extraVolumes:
    - name: loki-rules
      configMap:
        name: loki-alert-rules
  extraVolumeMounts:
    - name: loki-rules
      mountPath: /var/loki/rules/fake
      readOnly: true
gateway:
  enabled: false
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0
monitoring:
  selfMonitoring:
    enabled: false
  lokiCanary:
    enabled: false
extraObjects:
  - apiVersion: v1
    kind: ConfigMap
    metadata:
      name: loki-alerting-rules
      namespace: monitoring
      labels:
        loki_rule: "true"
    data:
      log-alerts.yml: |
        # 공통 파라미터: evaluation_window=5m, payment_threshold=10, auth_threshold=20
        groups:
          - name: payment-log-alerts
            rules:
              # 결제 에러 급증: 5분간 10건 초과가 1분 지속 시 critical
              - alert: PaymentErrorSpike
                expr: |
                  sum(count_over_time({log_type="payment"} | json | level=~"error|ERROR" [5m])) > 10
                for: 1m
                labels:
                  severity: critical
                  team: backend
                annotations:
                  summary: "결제 에러 급증 감지"
                  description: '5분간 결제 에러 로그 {{ "{{" }} $value {{ "}}" }}건 발생 (임계값: 10건)'
                  runbook: "TODO: https://wiki.goti.io/runbook/payment-error-spike"

          - name: auth-log-alerts
            rules:
              # 인증 실패 급증: 5분간 20건 초과가 2분 지속 시 warning (무차별 대입 공격 의심)
              - alert: AuthFailureSpike
                expr: |
                  sum(count_over_time({log_type="audit"} | json | action=~"login_failed|auth_denied" [5m])) > 20
                for: 2m
                labels:
                  severity: warning
                  team: security
                annotations:
                  summary: "인증 실패 급증 감지"
                  description: '5분간 인증 실패 {{ "{{" }} $value {{ "}}" }}건 발생 (임계값: 20건). 무차별 대입 공격 가능성 확인 필요'
                  runbook: "TODO: https://wiki.goti.io/runbook/auth-failure-spike"

          - name: pii-detection-alerts
            # PII 감지 정책 (2026-03-11 확정):
            #   - 주민번호: 수집 자체가 불법 (개인정보보호법) → 탐지 불필요
            #   - 카드번호: PG사/카드사 API 처리, 서버에 원문 미도달 → 탐지 불필요
            #   - 전화번호: 서버에서 처리 가능성 있음 → 마스킹 탐지 유지
            rules:
              # 마스킹되지 않은 휴대전화번호 패턴 감지 (010-XXXX-XXXX)
              - alert: UnmaskedPhoneDetected
                expr: |
                  sum(count_over_time({log_type=~".+"} |~ "\\b01[016789][- ]?[0-9]{3,4}[- ]?[0-9]{4}\\b" [5m])) > 0
                for: 0m
                labels:
                  severity: warning
                  team: security
                annotations:
                  summary: "마스킹되지 않은 PII(전화번호 패턴) 감지"
                  description: "로그에서 전화번호 패턴이 감지되었습니다. SensitiveDataMasker 적용 여부를 확인하세요."
                  runbook: "TODO: https://wiki.goti.io/runbook/unmasked-pii"
