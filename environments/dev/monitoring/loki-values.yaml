# Loki dev-kind values — SingleBinary mode
deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h
  structuredConfig:
    limits_config:
      retention_period: 168h
      per_stream_rate_limit: 3MB
      per_stream_rate_limit_burst: 10MB
      allow_structured_metadata: true
      retention_stream:
        - selector: '{log_type="payment"}'
          priority: 1
          period: 720h    # 30d (dev) — prod: 43800h (5년, 전자금융거래법 22조)
        - selector: '{log_type="audit"}'
          priority: 2
          period: 336h    # 14d (dev) — prod: 17520h (2년, 개인정보보호법)
    compactor:
      working_directory: /loki/compactor
      compaction_interval: 10m
      retention_enabled: true
      delete_request_store: filesystem
    ruler:
      storage:
        type: local
        local:
          directory: /loki/rules
      rule_path: /loki/rules-temp
      alertmanager_url: http://kube-prometheus-stack-alertmanager.monitoring.svc:9093
      ring:
        kvstore:
          store: inmemory
      enable_api: true

singleBinary:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 300m
      memory: 512Mi
  persistence:
    enabled: true
    size: 10Gi
  extraVolumes:
    - name: loki-rules
      configMap:
        name: loki-alert-rules
  extraVolumeMounts:
    - name: loki-rules
      mountPath: /loki/rules/fake
      readOnly: true

gateway:
  enabled: false

read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

monitoring:
  selfMonitoring:
    enabled: false
  lokiCanary:
    enabled: false

extraObjects:
  - apiVersion: v1
    kind: ConfigMap
    metadata:
      name: loki-alert-rules
      namespace: monitoring
    data:
      log-alerts.yml: |
        groups:
          - name: payment-log-alerts
            rules:
              - alert: PaymentErrorSpike
                expr: |
                  sum(count_over_time({log_type="payment"} | json | level=~"error|ERROR" [5m])) > 10
                for: 1m
                labels:
                  severity: critical
                  team: backend
                annotations:
                  summary: "결제 에러 급증 감지"
                  description: "5분간 결제 에러 로그 {{ "{{" }} $value {{ "}}" }}건 발생 (임계값: 10건)"
          - name: auth-log-alerts
            rules:
              - alert: AuthFailureSpike
                expr: |
                  sum(count_over_time({log_type="audit"} | json | action=~"login_failed|auth_denied" [5m])) > 20
                for: 2m
                labels:
                  severity: warning
                  team: security
                annotations:
                  summary: "인증 실패 급증 감지"
                  description: "5분간 인증 실패 {{ "{{" }} $value {{ "}}" }}건 발생 (임계값: 20건)"
          - name: pii-detection-alerts
            # 주민번호: 수집 자체가 불법 (개인정보보호법) — 탐지 불필요
            # 카드번호: PG사/카드사 API 처리, 서버에 원문 미도달 — 탐지 불필요
            rules:
              - alert: UnmaskedPhoneDetected
                expr: |
                  sum(count_over_time({log_type=~".+"} |~ "\\b01[016789][- ]?[0-9]{3,4}[- ]?[0-9]{4}\\b" [5m])) > 0
                for: 0m
                labels:
                  severity: warning
                  team: security
                annotations:
                  summary: "마스킹되지 않은 PII(전화번호 패턴) 감지"
                  description: "로그에서 전화번호 패턴이 감지되었습니다."
