# Monitoring Istio Gateway + VirtualService
# CloudFront → kind.go-ti.shop → Kind PC(31080) → Istio Gateway → monitoring 서비스
# CloudFront가 TLS 종단, Gateway↔Origin 구간은 HTTP
apiVersion: networking.istio.io/v1
kind: Gateway
metadata:
  name: monitoring-gateway
  namespace: monitoring
spec:
  selector:
    istio: gateway
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - "kind.go-ti.shop"
---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: monitoring-routes
  namespace: monitoring
spec:
  hosts:
    - "kind.go-ti.shop"
  gateways:
    - monitoring-gateway
  http:
    - match:
        - uri:
            exact: /grafana
        - uri:
            prefix: /grafana/
      route:
        - destination:
            host: kube-prometheus-stack-dev-grafana.monitoring.svc.cluster.local
            port:
              number: 80
      timeout: 30s
      retries:
        attempts: 2
        perTryTimeout: 10s
    - match:
        - uri:
            exact: /prometheus
        - uri:
            prefix: /prometheus/
      route:
        - destination:
            host: kube-prometheus-stack-dev-prometheus.monitoring.svc.cluster.local
            port:
              number: 9090
      timeout: 30s
      retries:
        attempts: 2
        perTryTimeout: 10s
---
# monitoring NS에 sidecar injection 없음 (현재도 향후도 유지)
# mesh-wide STRICT mTLS 전환 시에도 OTel 수신(goti-server → Alloy) 깨지지 않도록
# 명시적 PERMISSIVE 선언
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: monitoring-permissive
  namespace: monitoring
spec:
  mtls:
    mode: PERMISSIVE
