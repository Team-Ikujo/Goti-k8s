# Pyroscope dev-kind values
pyroscope:
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop: [ALL]
  structuredConfig:
    storage:
      backend: filesystem
      filesystem:
        dir: /data
  # compactor.blocks_retention deprecated → CLI flag 사용
  extraArgs:
    pyroscopedb.retention-period: 72h
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  persistence:
    enabled: true
    size: 5Gi
