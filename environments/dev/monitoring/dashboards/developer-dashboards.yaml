          "targets": [
            {
              "expr": "sum(increase(http_server_request_duration_seconds_count{job=\"$service_name\", http_response_status_code=~\"5..\"}[1h])) or vector(0)",
              "legendFormat": "5xx"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": { "steps": [{ "value": 0, "color": "green" }, { "value": 1, "color": "yellow" }, { "value": 10, "color": "red" }] }
