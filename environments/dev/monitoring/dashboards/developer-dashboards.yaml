      "timezone": "Asia/Seoul",
      "editable": true,
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "service_name",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "query": "label_values(http_server_request_duration_seconds_count, job)",
            "current": { "text": "goti/goti-server", "value": "goti/goti-server" },
            "refresh": 2
          },
          {
            "name": "svc",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "query": "label_values(http_server_request_duration_seconds_count, job)",
            "regex": ".*/(.+)",
            "current": { "text": "goti-server", "value": "goti-server" },
            "refresh": 2,
            "hide": 2
          },
          {
            "name": "interval",
            "type": "interval",
            "query": "5m,15m,1h",
            "current": { "text": "5m", "value": "5m" }
          }
        ]
      },
      "panels": [
        {
          "id": 100,
          "title": "에러 요약",
