  audit-log-viewer.json: |
    {
      "uid": "goti-audit-logs",
      "title": "Goti - Audit Log Viewer",
      "description": "감사 로그 전용 뷰어 (개인정보보호법 준수, 보관: dev 14일 / prod 2년)",
      "tags": [
        "goti",
        "audit",
        "log",
        "security",
        "devops"
      ],
      "timezone": "Asia/Seoul",
      "editable": true,
      "refresh": "",
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "templating": {
        "list": [
          {
            "name": "service",
            "type": "query",
            "datasource": {
              "type": "loki",
              "uid": "loki"
            },
            "query": "label_values({log_type=\"audit\"}, service_name)",
            "refresh": 2,
            "includeAll": true,
            "multi": true
          },
          {
            "name": "interval",
            "type": "interval",
            "query": "5m,15m,1h",
            "current": {
              "text": "5m",
              "value": "5m"
            }
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "Audit Event Volume",
          "type": "timeseries",
          "gridPos": {
            "h": 6,
            "w": 16,
            "x": 0,
            "y": 0
          },
          "datasource": {
            "type": "loki",
            "uid": "loki"
          },
          "targets": [
            {
              "expr": "sum(count_over_time({log_type=\"audit\", service_name=~\"$service\"} | json [1m])) by (action)",
              "legendFormat": "{{action}}"
            }
          ]
        },
        {
          "id": 2,
          "title": "Auth Failures",
          "type": "timeseries",
          "gridPos": {
            "h": 6,
            "w": 8,
            "x": 16,
            "y": 0
          },
          "datasource": {
            "type": "loki",
            "uid": "loki"
          },
          "targets": [
            {
              "expr": "sum(count_over_time({log_type=\"audit\", service_name=~\"$service\"} | json | action=~\"login_failed|auth_denied\" [1m])) by (action)",
              "legendFormat": "{{action}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "fixed",
                "fixedColor": "red"
              },
              "custom": {
                "fillOpacity": 20
              }
            }
          }
        },
        {
          "id": 3,
          "title": "Security Events",
          "type": "logs",
          "gridPos": {
            "h": 8,
            "w": 24,
            "x": 0,
            "y": 6
          },
          "datasource": {
            "type": "loki",
            "uid": "loki"
          },
          "targets": [
            {
              "expr": "{log_type=\"audit\", service_name=~\"$service\"} | detected_level=~\"WARN|ERROR\"",
              "legendFormat": ""
            }
          ],
          "options": {
            "showTime": true,
            "showLabels": true,
            "showCommonLabels": false,
            "wrapLogMessage": true,
            "enableLogDetails": true,
            "sortOrder": "Descending"
          }
        },
        {
          "id": 4,
          "title": "Access by Actor",
          "type": "table",
          "gridPos": {
            "h": 6,
            "w": 12,
            "x": 0,
            "y": 14
          },
          "datasource": {
            "type": "loki",
            "uid": "loki"
          },
          "targets": [
            {
              "expr": "topk(20, sum(count_over_time({log_type=\"audit\", service_name=~\"$service\"} | json [1h])) by (actor))",
              "legendFormat": "{{actor}}"
            }
          ],
          "transformations": [
            {
              "id": "sortBy",
              "options": {
                "sort": [
                  {
                    "field": "Value",
                    "desc": true
                  }
                ]
              }
            }
          ]
        },
        {
          "id": 5,
          "title": "All Audit Logs",
          "type": "logs",
          "gridPos": {
            "h": 10,
            "w": 12,
            "x": 12,
            "y": 14
          },
