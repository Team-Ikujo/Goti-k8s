  sli-slo-overview.json: |
    {
      "uid": "goti-devops-slo",
      "title": "Goti - SLI/SLO 종합 현황",
      "tags": [
        "goti",
        "slo",
        "sli",
        "devops"
      ],
      "timezone": "Asia/Seoul",
      "editable": true,
      "refresh": "1m",
      "time": {
        "from": "now-24h",
        "to": "now"
      },
      "templating": {
        "list": [
          {
            "name": "slo_window",
            "type": "custom",
            "query": "1h,6h,24h,3d",
            "current": {
              "text": "1h",
              "value": "1h"
            }
          },
          {
            "name": "interval",
            "type": "interval",
            "query": "5m,15m,1h",
            "current": {
              "text": "5m",
              "value": "5m"
            }
          }
        ]
      },
      "panels": [
        {
          "id": 100,
          "title": "현재 상태",
          "type": "row",
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "collapsed": false
        },
        {
          "id": 1,
          "title": "현재 가용성 (%)",
          "type": "stat",
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 0,
            "y": 1
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "goti:sli:availability:5m * 100",
              "legendFormat": "Availability"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "thresholds": {
                "steps": [
                  {
                    "value": 0,
                    "color": "red"
                  },
                  {
                    "value": 99,
                    "color": "yellow"
                  },
                  {
                    "value": 99.9,
                    "color": "green"
                  }
                ]
              }
            }
          }
        },
        {
          "id": 2,
          "title": "에러 버짓 잔여 (%)",
          "type": "stat",
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 6,
            "y": 1
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "goti:error_budget:remaining * 100",
              "legendFormat": "Budget"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "thresholds": {
                "steps": [
                  {
                    "value": 0,
                    "color": "red"
                  },
                  {
                    "value": 30,
                    "color": "yellow"
                  },
                  {
                    "value": 50,
                    "color": "green"
                  }
                ]
              }
            }
          }
        },
        {
          "id": 3,
          "title": "에러 버짓 소진율 (%/day)",
          "type": "stat",
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 12,
            "y": 1
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "(deriv(goti:error_budget:remaining[6h]) * 86400 * -100) or vector(0)",
              "legendFormat": "Burn Rate"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "thresholds": {
                "steps": [
                  {
                    "value": 0,
                    "color": "green"
                  },
                  {
                    "value": 3,
                    "color": "yellow"
                  },
                  {
                    "value": 10,
                    "color": "red"
                  }
                ]
              }
            }
          }
        },
        {
          "id": 4,
          "title": "Apdex Score",
          "type": "stat",
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 18,
            "y": 1
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "goti:apdex:score",
              "legendFormat": "Apdex"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "min": 0,
              "max": 1,
              "decimals": 3,
              "thresholds": {
                "steps": [
                  {
                    "value": 0,
                    "color": "red"
                  },
                  {
                    "value": 0.7,
                    "color": "yellow"
                  },
                  {
                    "value": 0.85,
                    "color": "green"
                  }
                ]
              }
            }
          }
        },
        {
          "id": 101,
          "title": "에러 버짓 번다운",
          "type": "row",
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 5
          },
          "collapsed": false
        },
        {
          "id": 5,
          "title": "30일 에러 버짓 번다운 차트",
          "type": "timeseries",
          "gridPos": {
            "h": 8,
            "w": 24,
            "x": 0,
            "y": 6
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "goti:error_budget:remaining",
              "legendFormat": "Error Budget Remaining"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": {
                "steps": [
                  {
                    "value": 0,
                    "color": "red"
                  },
                  {
                    "value": 0.3,
                    "color": "yellow"
                  },
                  {
                    "value": 0.5,
                    "color": "green"
                  }
                ]
              }
            }
          }
        },
        {
          "id": 102,
          "title": "Multi Burn Rate",
          "type": "row",
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 14
          },
          "collapsed": false
        },
        {
          "id": 6,
          "title": "Fast Burn (1h / 6h)",
          "type": "timeseries",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 15
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "1 - goti:sli:availability:1h",
              "legendFormat": "1h 에러율"
            },
            {
              "expr": "1 - goti:sli:availability:6h",
              "legendFormat": "6h 에러율"
            },
            {
              "expr": "vector(14.4 * 0.001)",
              "legendFormat": "14.4x budget (1h threshold)"
            },
            {
              "expr": "vector(6 * 0.001)",
              "legendFormat": "6x budget (6h threshold)"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit"
            }
          }
        },
        {
          "id": 7,
          "title": "Slow Burn (24h / 72h)",
          "type": "timeseries",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 15
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "1 - goti:sli:availability:24h",
              "legendFormat": "24h 에러율"
            },
            {
              "expr": "1 - goti:sli:availability:3d",
              "legendFormat": "3d 에러율"
            },
            {
