  payment-log-viewer.json: |
    {
      "uid": "goti-payment-logs",
      "title": "Goti - Payment Log Viewer",
      "description": "결제 로그 전용 뷰어 (전자금융거래법 22조 준수, 보관: dev 30일 / prod 5년)",
      "tags": [
        "goti",
        "payment",
        "log",
        "devops"
      ],
      "timezone": "Asia/Seoul",
      "editable": true,
      "refresh": "",
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "templating": {
        "list": [
          {
            "name": "service",
            "type": "query",
            "datasource": {
              "type": "loki",
              "uid": "loki"
            },
            "query": "label_values({log_type=\"payment\"}, service_name)",
            "refresh": 2,
            "includeAll": true,
            "multi": true
          },
          {
            "name": "interval",
            "type": "interval",
            "query": "5m,15m,1h",
            "current": {
              "text": "5m",
              "value": "5m"
            }
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "Payment Log Volume",
          "type": "timeseries",
          "gridPos": {
            "h": 6,
            "w": 16,
            "x": 0,
            "y": 0
          },
          "datasource": {
            "type": "loki",
            "uid": "loki"
          },
          "targets": [
            {
              "expr": "sum(count_over_time({log_type=\"payment\", service_name=~\"$service\"} [1m])) by (detected_level)",
              "legendFormat": "{{detected_level}}"
            }
          ]
        },
        {
          "id": 2,
          "title": "Payment Error Rate",
          "type": "stat",
          "gridPos": {
            "h": 6,
            "w": 8,
            "x": 16,
            "y": 0
          },
          "datasource": {
            "type": "loki",
            "uid": "loki"
          },
          "targets": [
            {
              "expr": "sum(count_over_time({log_type=\"payment\", service_name=~\"$service\"} | detected_level=\"ERROR\" [$interval])) / (sum(count_over_time({log_type=\"payment\", service_name=~\"$service\"} [$interval])) > 0) * 100",
              "legendFormat": "Error %"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "thresholds": {
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 1
                  },
                  {
                    "color": "red",
                    "value": 5
                  }
                ]
              }
            }
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            }
          }
        },
        {
          "id": 3,
          "title": "Payment Errors",
          "type": "logs",
          "gridPos": {
            "h": 8,
            "w": 24,
            "x": 0,
            "y": 6
          },
          "datasource": {
            "type": "loki",
            "uid": "loki"
          },
          "targets": [
            {
              "expr": "{log_type=\"payment\", service_name=~\"$service\"} | detected_level=\"ERROR\"",
              "legendFormat": ""
            }
          ],
          "options": {
            "showTime": true,
            "showLabels": true,
            "showCommonLabels": false,
            "wrapLogMessage": true,
            "enableLogDetails": true,
            "sortOrder": "Descending"
          }
        },
        {
          "id": 4,
          "title": "Payment Events by Status",
          "type": "timeseries",
          "gridPos": {
            "h": 6,
            "w": 12,
            "x": 0,
            "y": 14
          },
          "datasource": {
            "type": "loki",
            "uid": "loki"
          },
          "targets": [
            {
              "expr": "sum(count_over_time({log_type=\"payment\", service_name=~\"$service\"} | json [1m])) by (payment_status)",
              "legendFormat": "{{payment_status}}"
            }
          ]
        },
        {
          "id": 5,
          "title": "Payment Latency Distribution",
          "type": "timeseries",
          "gridPos": {
            "h": 6,
            "w": 12,
            "x": 12,
            "y": 14
          },
          "datasource": {
            "type": "loki",
            "uid": "loki"
          },
          "targets": [
            {
              "expr": "avg_over_time({log_type=\"payment\", service_name=~\"$service\"} | json | unwrap payment_duration_ms [1m]) by (service_name)",
              "legendFormat": "avg latency (ms)"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ms"
            }
          }
        },
        {
          "id": 6,
          "title": "Failed Payment Reasons",
          "type": "table",
          "gridPos": {
            "h": 6,
            "w": 12,
            "x": 0,
            "y": 20
          },
          "datasource": {
            "type": "loki",
            "uid": "loki"
          },
          "targets": [
            {
              "expr": "topk(10, sum(count_over_time({log_type=\"payment\", service_name=~\"$service\"} | detected_level=\"ERROR\" | json [1h])) by (error_code))",
              "legendFormat": "{{error_code}}"
            }
          ],
          "transformations": [
            {
              "id": "sortBy",
              "options": {
                "sort": [
                  {
                    "field": "Value",
                    "desc": true
                  }
                ]
              }
            }
          ]
        },
        {
          "id": 7,
          "title": "Transaction Details",
          "type": "logs",
          "gridPos": {
            "h": 10,
            "w": 12,
            "x": 12,
            "y": 20
          },
          "datasource": {
            "type": "loki",
            "uid": "loki"
          },
          "targets": [
            {
              "expr": "{log_type=\"payment\", service_name=~\"$service\"} | json",
              "legendFormat": ""
            }
          ],
          "options": {
            "showTime": true,
            "showLabels": true,
            "showCommonLabels": false,
            "wrapLogMessage": true,
            "enableLogDetails": true,
