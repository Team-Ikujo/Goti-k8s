            "content": "### 결제 로그 보관 정책\n- **dev**: 30일\n- **prod**: 5년 (전자금융거래법 22조 + 전자상거래법 시행령 6조)\n\n**마스킹**: 카드번호 BIN(6)+last4만 표시, CVV/PIN 절대 저장 금지 (PCI-DSS v4.0)"
          }
