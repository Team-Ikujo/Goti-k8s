            {
              "expr": "vector(1 * 0.001)",
              "legendFormat": "1x budget (3d threshold)"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit"
            }
          }
        },
        {
          "id": 9,
          "title": "에러 버짓 소진 예측 (남은 시간)",
          "type": "stat",
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 18,
            "y": 5
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "(goti:error_budget:remaining / clamp_min(deriv(goti:error_budget:remaining[6h]) * -1, 0.0001)) / 3600",
              "legendFormat": "Remaining"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "h",
              "thresholds": {
                "steps": [
                  {
                    "value": 0,
                    "color": "red"
                  },
                  {
                    "value": 24,
                    "color": "yellow"
                  },
                  {
                    "value": 168,
                    "color": "green"
                  }
                ]
              }
            }
          }
        },
        {
          "id": 103,
          "title": "SLI 상세",
          "type": "row",
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 23
          },
          "collapsed": false
        },
        {
          "id": 8,
          "title": "지연시간 SLI (p50 / p95 / p99)",
          "type": "timeseries",
          "gridPos": {
            "h": 8,
            "w": 24,
            "x": 0,
            "y": 24
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(http_server_request_duration_seconds_bucket{job=~\"$service_name\"}[$interval])) by (le))",
              "legendFormat": "p50"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_server_request_duration_seconds_bucket{job=~\"$service_name\"}[$interval])) by (le))",
              "legendFormat": "p95"
            },
            {
              "expr": "goti:sli:latency_p99:5m",
              "legendFormat": "p99"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s"
            }
          }
        }
      ],
      "schemaVersion": 39
    }
