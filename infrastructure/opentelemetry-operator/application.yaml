# OpenTelemetry Operator — auto-instrumentation으로 Java agent 자동 주입
# 의존성: cert-manager (webhook 인증서)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: opentelemetry-operator
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://open-telemetry.github.io/opentelemetry-helm-charts
      chart: opentelemetry-operator
      targetRevision: 0.107.*
      helm:
        valueFiles:
          - $values/infrastructure/opentelemetry-operator/values.yaml
    - repoURL: https://github.com/Team-Ikujo/Goti-k8s.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: opentelemetry-operator
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
