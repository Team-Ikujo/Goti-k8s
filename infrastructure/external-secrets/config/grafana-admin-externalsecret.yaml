# Grafana admin 자격증명 — SSM Parameter Store에서 동기화
# SSM 경로: /dev/kind/monitoring/GF_ADMIN_*
# kube-prometheus-stack values의 grafana.admin.existingSecret 참조
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-admin-secret
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: grafana-admin-secret
    creationPolicy: Owner
  data:
    - secretKey: admin-user
      remoteRef:
        key: /dev/kind/monitoring/GF_ADMIN_USER
    - secretKey: admin-password
      remoteRef:
        key: /dev/kind/monitoring/GF_ADMIN_PASSWORD
