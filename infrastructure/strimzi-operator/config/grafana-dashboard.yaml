# Kafka Grafana 대시보드 — Grafana sidecar 자동 감지
# grafana_dashboard: "1" 라벨 → Grafana sidecar가 ConfigMap을 대시보드로 로드
apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-dashboard
  namespace: kafka
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Kafka"
data:
  kafka-overview.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 100,
          "title": "Cluster Overview",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 1 }
                ]
              },
              "mappings": [
                { "options": { "0": { "text": "No Active Controller" }, "1": { "text": "Active" } }, "type": "value" }
              ]
            }
          },
          "gridPos": { "h": 4, "w": 4, "x": 0, "y": 1 },
          "id": 1,
          "options": { "colorMode": "background", "graphMode": "none", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "targets": [
            {
              "expr": "sum(kafka_controller_kafkacontroller_activecontrollercount{namespace=\"kafka\"})",
              "legendFormat": "Active Controllers"
            }
          ],
          "title": "Active Controller",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "orange", "value": 1 },
                  { "color": "green", "value": 3 }
                ]
              }
            }
          },
          "gridPos": { "h": 4, "w": 4, "x": 4, "y": 1 },
          "id": 2,
          "options": { "colorMode": "background", "graphMode": "none", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "targets": [
            {
              "expr": "count(kafka_server_brokertopicmetrics_messagesinpersec{namespace=\"kafka\"})",
              "legendFormat": "Online Brokers"
            }
          ],
          "title": "Online Brokers",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "orange", "value": 1 },
                  { "color": "red", "value": 5 }
                ]
              }
            }
          },
          "gridPos": { "h": 4, "w": 4, "x": 8, "y": 1 },
          "id": 3,
          "options": { "colorMode": "background", "graphMode": "area", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "targets": [
            {
              "expr": "sum(kafka_server_replicamanager_underreplicatedpartitions{namespace=\"kafka\"})",
              "legendFormat": "Under-Replicated"
            }
          ],
          "title": "Under-Replicated Partitions",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 1 }
                ]
              }
            }
          },
          "gridPos": { "h": 4, "w": 4, "x": 12, "y": 1 },
          "id": 4,
          "options": { "colorMode": "background", "graphMode": "none", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "targets": [
            {
              "expr": "sum(kafka_controller_kafkacontroller_offlinepartitionscount{namespace=\"kafka\"})",
              "legendFormat": "Offline"
            }
          ],
          "title": "Offline Partitions",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "steps": [
                  { "color": "blue", "value": null }
                ]
              }
            }
          },
          "gridPos": { "h": 4, "w": 4, "x": 16, "y": 1 },
          "id": 5,
          "options": { "colorMode": "background", "graphMode": "none", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "targets": [
            {
              "expr": "sum(kafka_server_replicamanager_partitioncount{namespace=\"kafka\"})",
              "legendFormat": "Total"
            }
          ],
          "title": "Total Partitions",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "steps": [
                  { "color": "blue", "value": null }
                ]
              }
            }
          },
          "gridPos": { "h": 4, "w": 4, "x": 20, "y": 1 },
          "id": 6,
          "options": { "colorMode": "background", "graphMode": "none", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "targets": [
            {
              "expr": "sum(kafka_server_replicamanager_leadercount{namespace=\"kafka\"})",
              "legendFormat": "Total"
            }
          ],
          "title": "Leader Count",
          "type": "stat"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 5 },
          "id": 101,
          "title": "Throughput",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2, "showPoints": "never" },
              "unit": "ops"
            }
          },
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 6 },
          "id": 10,
          "options": { "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"] }, "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "expr": "sum(kafka_server_brokertopicmetrics_messagesinpersec{namespace=\"kafka\"}) by (topic)",
              "legendFormat": "{{ topic }}"
            },
            {
              "expr": "sum(kafka_server_brokertopicmetrics_messagesinpersec{namespace=\"kafka\"})",
              "legendFormat": "Total"
            }
          ],
          "title": "Messages In / sec",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2, "showPoints": "never" },
              "unit": "Bps"
            }
          },
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 6 },
          "id": 11,
          "options": { "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"] }, "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "expr": "sum(kafka_server_brokertopicmetrics_bytesinpersec{namespace=\"kafka\"}) by (topic)",
              "legendFormat": "{{ topic }}"
            },
            {
              "expr": "sum(kafka_server_brokertopicmetrics_bytesinpersec{namespace=\"kafka\"})",
              "legendFormat": "Total"
            }
          ],
          "title": "Bytes In / sec",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2, "showPoints": "never" },
              "unit": "Bps"
            }
          },
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 6 },
          "id": 12,
          "options": { "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"] }, "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "expr": "sum(kafka_server_brokertopicmetrics_bytesoutpersec{namespace=\"kafka\"}) by (topic)",
              "legendFormat": "{{ topic }}"
            },
            {
              "expr": "sum(kafka_server_brokertopicmetrics_bytesoutpersec{namespace=\"kafka\"})",
              "legendFormat": "Total"
            }
          ],
          "title": "Bytes Out / sec",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 14 },
          "id": 102,
          "title": "Replication & Performance",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2, "showPoints": "never" },
              "unit": "short"
            }
          },
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 15 },
          "id": 20,
          "options": { "legend": { "displayMode": "table", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "expr": "sum(kafka_server_replicamanager_underreplicatedpartitions{namespace=\"kafka\"}) by (pod)",
              "legendFormat": "{{ pod }}"
            }
          ],
          "title": "Under-Replicated Partitions (per Broker)",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2, "showPoints": "never" },
              "unit": "ops"
            }
          },
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 15 },
          "id": 21,
          "options": { "legend": { "displayMode": "table", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "expr": "sum(rate(kafka_network_requestmetrics_totaltimerequests{namespace=\"kafka\"}[5m])) by (request)",
              "legendFormat": "{{ request }}"
            }
          ],
          "title": "Network Request Rate (by type)",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2, "showPoints": "never" },
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "thresholds": {
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "orange", "value": 0.3 },
                  { "color": "green", "value": 0.5 }
                ]
              }
            }
          },
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 15 },
          "id": 22,
          "options": { "legend": { "displayMode": "table", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "expr": "kafka_server_kafkarequesthandlerpool_requesthandleravgidlepercent{namespace=\"kafka\"}",
              "legendFormat": "{{ pod }}"
            }
          ],
          "title": "Request Handler Avg Idle %",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 23 },
          "id": 103,
          "title": "Storage",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "custom": { "drawStyle": "bars", "fillOpacity": 50, "lineWidth": 1, "showPoints": "never", "stacking": { "mode": "normal" } },
              "unit": "bytes"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 24 },
          "id": 30,
          "options": { "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["lastNotNull"] }, "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "expr": "sum(kafka_log_log_size{namespace=\"kafka\"}) by (topic)",
              "legendFormat": "{{ topic }}"
            }
          ],
          "title": "Log Size (per Topic)",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2, "showPoints": "never" },
              "unit": "short"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 24 },
          "id": 31,
          "options": { "legend": { "displayMode": "table", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "expr": "sum(kafka_server_replicamanager_partitioncount{namespace=\"kafka\"}) by (pod)",
              "legendFormat": "{{ pod }}"
            },
            {
              "expr": "sum(kafka_server_replicamanager_leadercount{namespace=\"kafka\"}) by (pod)",
              "legendFormat": "{{ pod }} (leaders)"
            }
          ],
          "title": "Partition & Leader Distribution",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 32 },
          "id": 104,
          "title": "JVM",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "custom": { "drawStyle": "line", "fillOpacity": 20, "lineWidth": 2, "showPoints": "never" },
              "unit": "bytes"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 33 },
          "id": 40,
          "options": { "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"] }, "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "expr": "java_lang_memory_heapmemoryusage_used{namespace=\"kafka\"}",
              "legendFormat": "{{ pod }} used"
            },
            {
              "expr": "java_lang_memory_heapmemoryusage_max{namespace=\"kafka\"}",
              "legendFormat": "{{ pod }} max"
            }
          ],
          "title": "JVM Heap Memory",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2, "showPoints": "never" },
              "unit": "ops"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 33 },
          "id": 41,
          "options": { "legend": { "displayMode": "table", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "expr": "rate(java_lang_garbagecollector_collectioncount{namespace=\"kafka\"}[5m])",
              "legendFormat": "{{ pod }} - {{ name }}"
            }
          ],
          "title": "GC Collection Rate",
          "type": "timeseries"
        }
      ],
      "schemaVersion": 39,
      "tags": ["kafka", "strimzi", "messaging"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "Kafka Cluster Overview",
      "uid": "kafka-cluster-overview",
      "version": 1
    }
