apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: goti-server
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - env: dev
            namespace: goti
            valuesFile: environments/dev/goti-server/values.yaml
  template:
    metadata:
      name: "goti-server-{{env}}"
    spec:
      project: goti
      sources:
        - repoURL: "https://github.com/Team-Ikujo/Goti-k8s.git"
          targetRevision: main
          path: "charts/goti-server"
          helm:
            valueFiles:
              - "$values/{{valuesFile}}"
        - repoURL: "https://github.com/Team-Ikujo/Goti-k8s.git"
          targetRevision: main
          ref: values
      destination:
        server: "https://kubernetes.default.svc"
        namespace: "{{namespace}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
      ignoreDifferences:
        - group: autoscaling
          kind: HorizontalPodAutoscaler
          jsonPointers:
            - /spec/replicas
