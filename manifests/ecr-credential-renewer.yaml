apiVersion: v1
kind: ServiceAccount
metadata:
  name: ecr-credential-renewer
  namespace: goti
---
# goti 네임스페이스 Role — create는 resourceNames 제한 불가 (K8s 제약)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ecr-credential-renewer
  namespace: goti
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["ecr-creds"]
    verbs: ["get", "patch", "update"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ecr-credential-renewer
  namespace: goti
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ecr-credential-renewer
subjects:
  - kind: ServiceAccount
    name: ecr-credential-renewer
    namespace: goti
---
# argocd 네임스페이스 Role (Image Updater용)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ecr-credential-renewer
  namespace: argocd
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["ecr-creds"]
    verbs: ["get", "patch", "update"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ecr-credential-renewer
  namespace: argocd
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ecr-credential-renewer
subjects:
  - kind: ServiceAccount
    name: ecr-credential-renewer
    namespace: goti
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ecr-credential-renewer
  namespace: goti
spec:
  schedule: "0 */6 * * *"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 300
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 600
      template:
        metadata:
          annotations:
            sidecar.istio.io/inject: "false"
        spec:
          serviceAccountName: ecr-credential-renewer
          restartPolicy: OnFailure
          containers:
            - name: ecr-renewer
              image: amazon/aws-cli:2.27.31
              envFrom:
                - secretRef:
                    name: aws-ecr-creds
              # amazon/aws-cli 이미지는 root(uid 0)로 실행됨
              # TODO: 커스텀 이미지(non-root) 빌드 후 runAsNonRoot: true 전환
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 200m
                  memory: 256Mi
              command:
                - /bin/sh
                - -c
                - |
                  set -euo pipefail

                  # kubectl 설치 (aws-cli 이미지에 미포함)
                  curl -sLo /tmp/kubectl "https://dl.k8s.io/release/v1.34.0/bin/linux/amd64/kubectl"
                  curl -sLo /tmp/kubectl.sha256 "https://dl.k8s.io/release/v1.34.0/bin/linux/amd64/kubectl.sha256"
                  echo "$(cat /tmp/kubectl.sha256)  /tmp/kubectl" | sha256sum -c -
                  chmod +x /tmp/kubectl

                  TOKEN=$(aws ecr get-login-password --region "$AWS_REGION")
                  if [ -z "$TOKEN" ]; then
                    echo "ERROR: Failed to get ECR token" >&2
                    exit 1
                  fi

                  ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
                  REGISTRY="${ACCOUNT}.dkr.ecr.${AWS_REGION}.amazonaws.com"

                  # 대상 네임스페이스 목록 (MSA 추가 시 여기만 확장)
                  NAMESPACES="goti argocd"

                  for NS in $NAMESPACES; do
                    /tmp/kubectl create secret docker-registry ecr-creds \
                      --namespace "$NS" \
                      --docker-server="${REGISTRY}" \
                      --docker-username=AWS \
                      --docker-password="${TOKEN}" \
                      --dry-run=client -o yaml | /tmp/kubectl apply -f -
                    echo "Updated ecr-creds in namespace: $NS"
                  done
