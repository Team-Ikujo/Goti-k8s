apiVersion: v1
kind: ServiceAccount
metadata:
  name: ecr-credential-renewer
  namespace: goti
---
# goti 네임스페이스 Role
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ecr-credential-renewer
  namespace: goti
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ecr-credential-renewer
  namespace: goti
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ecr-credential-renewer
subjects:
  - kind: ServiceAccount
    name: ecr-credential-renewer
    namespace: goti
---
# argocd 네임스페이스 Role (Image Updater용)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ecr-credential-renewer
  namespace: argocd
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ecr-credential-renewer
  namespace: argocd
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ecr-credential-renewer
subjects:
  - kind: ServiceAccount
    name: ecr-credential-renewer
    namespace: goti
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ecr-credential-renewer
  namespace: goti
spec:
  schedule: "0 */6 * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        metadata:
          annotations:
            sidecar.istio.io/inject: "false"
        spec:
          serviceAccountName: ecr-credential-renewer
          restartPolicy: OnFailure
          containers:
            - name: ecr-renewer
              image: bitnami/kubectl:1.34
              envFrom:
                - secretRef:
                    name: aws-ecr-creds
              command:
                - /bin/sh
                - -c
                - |
                  # aws-cli 설치
                  curl -s "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
                  unzip -q /tmp/awscliv2.zip -d /tmp
                  /tmp/aws/install --bin-dir /usr/local/bin --install-dir /tmp/aws-cli

                  TOKEN=$(aws ecr get-login-password --region $AWS_REGION)
                  ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
                  REGISTRY="${ACCOUNT}.dkr.ecr.${AWS_REGION}.amazonaws.com"

                  # 대상 네임스페이스 목록 (MSA 추가 시 여기만 확장)
                  NAMESPACES="goti argocd"

                  for NS in $NAMESPACES; do
                    kubectl delete secret ecr-creds --namespace $NS --ignore-not-found
                    kubectl create secret docker-registry ecr-creds \
                      --namespace $NS \
                      --docker-server=${REGISTRY} \
                      --docker-username=AWS \
                      --docker-password=${TOKEN}
                    echo "Updated ecr-creds in namespace: $NS"
                  done
