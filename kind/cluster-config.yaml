# Goti 로컬 개발 환경 Kind 클러스터 설정
# control-plane 1개 + worker 2개 구성
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: goti-dev
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      # HTTP/HTTPS (Ingress)
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
      # ArgoCD NodePort
      - containerPort: 30080
        hostPort: 30080
        protocol: TCP
      - containerPort: 30443
        hostPort: 30443
        protocol: TCP
      # Istio Gateway NodePort
      - containerPort: 31080
        hostPort: 31080
        protocol: TCP
      - containerPort: 31443
        hostPort: 31443
        protocol: TCP
  - role: worker
  - role: worker
